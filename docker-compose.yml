services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuisinesync}
      POSTGRES_USER: ${POSTGRES_USER:-cuisinesync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cuisinesync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    build: ./back-end
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  front:
    build: ./front-end
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - back

volumes:
  postgres_data:
